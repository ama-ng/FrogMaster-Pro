<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="description" content="Eat That Frog - A professional productivity operating system to stop procrastinating, prioritize with the ABCDE method, build habits, and get your most important work done." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Eat That Frog · Productivity OS</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%B8%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ====== APP SHELL ====== -->
  <div class="app" id="app">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <div class="sidebar__brand">
        <span class="sidebar__logo" aria-hidden="true">🐸</span>
        <div class="sidebar__brand-text">
          <strong>Eat That Frog</strong>
          <small>Productivity OS</small>
        </div>
        <button class="sidebar__close icon-btn" id="sidebarClose" aria-label="Close menu">&times;</button>
      </div>

      <nav class="nav" id="nav">
        <button class="nav__item is-active" data-view="dashboard"><span class="nav__ico">◈</span> Dashboard</button>
        <button class="nav__item" data-view="frogs"><span class="nav__ico">🐸</span> Frog Engine</button>
        <button class="nav__item" data-view="abcde"><span class="nav__ico">🔤</span> ABCDE Method</button>
        <button class="nav__item" data-view="pareto"><span class="nav__ico">⚡</span> 80/20 Analyzer</button>
        <button class="nav__item" data-view="goals"><span class="nav__ico">🎯</span> Goals</button>
        <button class="nav__item" data-view="planner"><span class="nav__ico">🗓️</span> Daily Planner</button>
        <button class="nav__item" data-view="focus"><span class="nav__ico">🎧</span> Focus Mode</button>
        <button class="nav__item" data-view="habits"><span class="nav__ico">🔥</span> Habits</button>
        <button class="nav__item" data-view="analytics"><span class="nav__ico">📊</span> Analytics</button>
        <button class="nav__item" data-view="kra"><span class="nav__ico">🧭</span> Key Result Areas</button>
        <button class="nav__item" data-view="reviews"><span class="nav__ico">📝</span> Reviews</button>
        <button class="nav__item" data-view="settings"><span class="nav__ico">⚙️</span> Settings</button>
      </nav>

      <div class="sidebar__footer">
        <div class="level-card" id="levelCard">
          <div class="level-card__ring" id="levelRing"></div>
          <div class="level-card__meta">
            <strong id="levelLabel">Level 1</strong>
            <small id="xpLabel">0 XP</small>
          </div>
        </div>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- ===== MAIN ===== -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn topbar__menu" id="menuBtn" aria-label="Open menu">☰</button>
        <div class="search">
          <span class="search__ico" aria-hidden="true">⌕</span>
          <input type="search" id="globalSearch" placeholder="Search tasks, goals, habits..." aria-label="Search" />
          <div class="search__results" id="searchResults" hidden></div>
        </div>
        <div class="topbar__actions">
          <button class="icon-btn" id="reviewBtn" aria-label="Daily review" title="Daily review">📝</button>
          <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">🌙</button>
          <button class="btn btn--primary topbar__add" id="quickAdd"><span>＋</span> New Frog</button>
        </div>
      </header>

      <main class="content" id="content" tabindex="-1">
        <!-- Views injected/toggled here -->
        <section class="view is-active" data-view="dashboard" id="view-dashboard"></section>
        <section class="view" data-view="frogs" id="view-frogs"></section>
        <section class="view" data-view="abcde" id="view-abcde"></section>
        <section class="view" data-view="pareto" id="view-pareto"></section>
        <section class="view" data-view="goals" id="view-goals"></section>
        <section class="view" data-view="planner" id="view-planner"></section>
        <section class="view" data-view="focus" id="view-focus"></section>
        <section class="view" data-view="habits" id="view-habits"></section>
        <section class="view" data-view="analytics" id="view-analytics"></section>
        <section class="view" data-view="kra" id="view-kra"></section>
        <section class="view" data-view="reviews" id="view-reviews"></section>
        <section class="view" data-view="settings" id="view-settings"></section>
      </main>

      <footer class="footer">
        Copyright © 2026 AMA Global Inc. All Rights Reserved.
      </footer>

      <!-- Mobile bottom nav -->
      <nav class="bottomnav" id="bottomnav" aria-label="Mobile navigation">
        <button class="bottomnav__item is-active" data-view="dashboard"><span>◈</span><small>Home</small></button>
        <button class="bottomnav__item" data-view="frogs"><span>🐸</span><small>Frogs</small></button>
        <button class="bottomnav__item" data-view="focus"><span>🎧</span><small>Focus</small></button>
        <button class="bottomnav__item" data-view="habits"><span>🔥</span><small>Habits</small></button>
        <button class="bottomnav__item" data-view="analytics"><span>📊</span><small>Stats</small></button>
      </nav>
    </div>
  </div>

  <!-- ===== Floating action button (mobile) ===== -->
  <button class="fab" id="fab" aria-label="Add new frog">＋</button>

  <!-- ===== Modal root ===== -->
  <div class="modal-root" id="modalRoot" hidden></div>

  <!-- ===== Toast root ===== -->
  <div class="toast-root" id="toastRoot" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
